<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Vision - Future of Image Generation</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <!-- NAVBAR -->
    <nav>
        <div class="container nav-container">
            <div class="logo"><i class="fas fa-brain"></i> AI Vision</div>
            <ul class="nav-links">
                <!-- ✅ Updated Links to point to new routes -->
                <li><a href="/">Home</a></li>
                <li><a href="/#generator">Generate</a></li>
                <li><a href="/features">Features</a></li>
                <li><a href="/gallery">Gallery</a></li>
                <li><a href="/about">About</a></li>
                <li><a href="/contact">Contact</a></li>
            </ul>
            <button class="hamburger" aria-label="Toggle navigation menu">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </nav>

    <!-- HERO -->
    <section id="hero">
        <div id="canvas-container"></div>
        <div class="container hero-content">
            <h1>Generate AI Images <br><span>In Seconds</span></h1>
            <p>Turn your imagination into reality using AI.</p>
            <a href="#generator" class="btn btn-primary">Start Generating</a>
        </div>
    </section>

    <!-- GENERATOR -->
    <section id="generator">
        <div class="container">
            <h2 class="section-title">Create Your Vision</h2>

            <div class="generator-box">
                <textarea id="promptInput" placeholder="Enter your prompt..."></textarea>

                <button id="generateBtn" class="btn btn-primary">Generate Image</button>

                <div class="output-area">
                    <p class="placeholder-text">Generated image will appear here</p>
                    <div id="loader" style="display:none;">Loading...</div>
                    <img id="generatedImage" style="display:none;" />
                </div>

                <div id="downloadContainer" style="display:none;">
                    <button id="downloadBtn" class="btn btn-primary">Download</button>
                </div>
            </div>
        </div>
    </section>

    <!-- SCRIPTS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>
</html>
