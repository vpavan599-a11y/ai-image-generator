<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - AI Vision</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <!-- NAVBAR -->
    <nav>
        <div class="container nav-container">
            <div class="logo"><i class="fas fa-brain"></i> AI Vision</div>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/#generator">Generate</a></li>
                <li><a href="/features">Features</a></li>
                <li><a href="/gallery">Gallery</a></li>
                <li><a href="/about">About</a></li>
                <li><a href="/contact">Contact</a></li>
            </ul>
            <button class="hamburger" aria-label="Toggle navigation menu">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </nav>

    <!-- 3D BACKGROUND CONTAINER -->
    <div id="canvas-container"></div>

    <!-- PAGE CONTENT -->
    <section class="page-section">
        <div class="container">
            <h1 class="section-title">Gallery</h1>
            
            <div class="gallery-filters">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="recent">Recent</button>
            </div>
            
            <div class="gallery-grid" id="galleryGrid">
                <!-- Gallery items will be loaded dynamically -->
                <div class="gallery-placeholder">
                    <p>Loading gallery...</p>
                </div>
            </div>
        </div>
    </section>

    <!-- SCRIPTS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
    
    <script>
        // Initialize Three.js background
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof initThreeJS === 'function') {
                initThreeJS();
            }
            
            // Load gallery items
            fetch('/api/history')
                .then(response => response.json())
                .then(data => {
                    const galleryGrid = document.getElementById('galleryGrid');
                    galleryGrid.innerHTML = '';
                    
                    if (data.history && data.history.length > 0) {
                        // Reverse to show newest first
                        [...data.history].reverse().forEach(item => {
                            // Check if image data exists
                            if(item.image) {
                                const galleryItem = document.createElement('div');
                                galleryItem.className = 'gallery-item';
                                galleryItem.innerHTML = `
                                    <img src="${item.image}" alt="${item.prompt}">
                                    <div class="gallery-item-overlay">
                                        <p class="gallery-item-prompt">${item.prompt}</p>
                                    </div>
                                `;
                                galleryGrid.appendChild(galleryItem);
                            }
                        });
                    } else {
                        galleryGrid.innerHTML = '<div class="gallery-placeholder"><p>No images in your gallery yet. Start generating!</p></div>';
                    }
                })
                .catch(error => {
                    console.error('Error loading gallery:', error);
                    document.getElementById('galleryGrid').innerHTML = '<div class="gallery-placeholder"><p>Error loading gallery. Please try again later.</p></div>';
                });
        });
    </script>
</body>
</html>
